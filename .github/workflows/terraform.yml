name: Terraform Deploy

on:
  push:
    branches: [main]
    paths: ['environments/**']
  pull_request:
    branches: [main]
    paths: ['environments/**']

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: '1.7.5'
  TG_VERSION: '0.55.1'
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  # ── Detect which projects changed ──────────────────────────────────────────
  detect:
    name: Detect Changed Projects
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.find.outputs.projects }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed project directories
        id: find
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- environments/ | \
              grep -oP 'environments/[^/]+' | sort -u | sed 's|environments/||')
          else
            CHANGED=$(git diff --name-only HEAD~1 -- environments/ | \
              grep -oP 'environments/[^/]+' | sort -u | sed 's|environments/||')
          fi
          # Filter out files (terragrunt.hcl, .gitkeep) — keep only directories
          PROJECTS=()
          for p in $CHANGED; do
            if [ -d "environments/$p" ]; then
              PROJECTS+=("\"$p\"")
            fi
          done
          if [ ${#PROJECTS[@]} -eq 0 ]; then
            echo "projects=[]" >> "$GITHUB_OUTPUT"
          else
            echo "projects=[$(IFS=,; echo "${PROJECTS[*]}")]" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected projects: ${PROJECTS[*]}"

  # ── PLAN — runs on every PR ────────────────────────────────────────────────
  plan:
    name: Terragrunt Plan — ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: detect
    if: github.event_name == 'pull_request' && needs.detect.outputs.projects != '[]'
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect.outputs.projects) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64" -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-terragrunt-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt Plan All
        id: plan
        working-directory: environments/${{ matrix.project }}
        run: |
          terragrunt run-all plan \
            --terragrunt-non-interactive \
            --terragrunt-include-external-dependencies \
            -no-color 2>&1 | tee plan_output.txt

      - name: Release State Locks
        if: always()
        working-directory: environments/${{ matrix.project }}
        run: |
          PROJECT=$(python3 -c "import yaml; print(yaml.safe_load(open('project.yaml'))['project'])")
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          TABLE="${PROJECT}-tf-lock-${ACCOUNT_ID}"
          BUCKET="${PROJECT}-tf-state-${ACCOUNT_ID}"
          echo "Scanning DynamoDB table: $TABLE for stale locks..."
          LOCK_IDS=$(aws dynamodb scan \
            --table-name "$TABLE" \
            --filter-expression "begins_with(LockID, :prefix)" \
            --expression-attribute-values "{\":prefix\":{\"S\":\"${BUCKET}/\"}}" \
            --query "Items[*].LockID.S" \
            --output text 2>/dev/null || true)
          if [ -z "$LOCK_IDS" ]; then
            echo "No stale locks found."
          else
            for LOCK_ID in $LOCK_IDS; do
              echo "Releasing lock: $LOCK_ID"
              aws dynamodb delete-item \
                --table-name "$TABLE" \
                --key "{\"LockID\":{\"S\":\"${LOCK_ID}\"}}"
            done
            echo "All locks released."
          fi

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(
              `environments/${{ matrix.project }}/plan_output.txt`, 'utf8'
            );
            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;

            const body = `### Terraform Plan — \`${{ matrix.project }}\` 📋

            <details>
            <summary>Click to expand plan output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            *Merge this PR to apply changes for project \`${{ matrix.project }}\`.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

  # ── APPLY — runs when merged to main ───────────────────────────────────────
  apply:
    name: Terragrunt Apply — ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: detect
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect.outputs.projects != '[]'
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect.outputs.projects) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64" -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-terragrunt-apply
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt Apply All
        id: apply
        working-directory: environments/${{ matrix.project }}
        run: |
          terragrunt run-all apply \
            --terragrunt-non-interactive \
            --terragrunt-include-external-dependencies \
            -auto-approve -no-color

      - name: Release State Locks
        if: always()
        working-directory: environments/${{ matrix.project }}
        run: |
          PROJECT=$(python3 -c "import yaml; print(yaml.safe_load(open('project.yaml'))['project'])")
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          TABLE="${PROJECT}-tf-lock-${ACCOUNT_ID}"
          BUCKET="${PROJECT}-tf-state-${ACCOUNT_ID}"
          echo "Scanning DynamoDB table: $TABLE for stale locks..."
          LOCK_IDS=$(aws dynamodb scan \
            --table-name "$TABLE" \
            --filter-expression "begins_with(LockID, :prefix)" \
            --expression-attribute-values "{\":prefix\":{\"S\":\"${BUCKET}/\"}}" \
            --query "Items[*].LockID.S" \
            --output text 2>/dev/null || true)
          if [ -z "$LOCK_IDS" ]; then
            echo "No stale locks found."
          else
            for LOCK_ID in $LOCK_IDS; do
              echo "Releasing lock: $LOCK_ID"
              aws dynamodb delete-item \
                --table-name "$TABLE" \
                --key "{\"LockID\":{\"S\":\"${LOCK_ID}\"}}"
            done
            echo "All locks released."
          fi
